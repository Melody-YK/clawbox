name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"
      - run: bun install --frozen-lockfile
      - run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"

      - name: Install
        id: install
        continue-on-error: true
        run: bun install --frozen-lockfile

      - name: Test with coverage
        id: tests
        if: always()
        continue-on-error: true
        run: |
          set -o pipefail
          bun run test:coverage 2>&1 | tee test-output.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Parse coverage
        id: coverage
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json','utf8')).total;
              const w = (k,v) => require('fs').appendFileSync(process.env.GITHUB_OUTPUT, k+'='+v+'\n');
              w('found','true');
              w('statements',s.statements.pct);
              w('branches',s.branches.pct);
              w('functions',s.functions.pct);
              w('lines',s.lines.pct);
            "
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if tests failed
        if: ${{ steps.install.outcome != 'success' || steps.tests.outputs.exit_code != '0' }}
        run: exit 1

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"
      - run: bun install --frozen-lockfile
      - run: bun run build

  comment:
    # Skip for fork PRs: GITHUB_TOKEN is always read-only on fork PRs regardless
    # of repo/workflow permissions, so the comment would 403. Native PR checks
    # UI already shows the same status.
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Comment PR
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        with:
          script: |
            const marker = '<!-- clawbox-ci -->';
            const lint = process.env.LINT_RESULT === 'success' ? '✅' : '❌';
            const test = process.env.TEST_RESULT === 'success' ? '✅' : '❌';
            const build = process.env.BUILD_RESULT === 'success' ? '✅' : '❌';
            const allOk = lint === '✅' && test === '✅' && build === '✅';
            const body = [
              marker,
              `## ${allOk ? '✅' : '❌'} CI Report`,
              `| Check | Status |`,
              `|-------|--------|`,
              `| Lint | ${lint} |`,
              `| Tests | ${test} |`,
              `| Build | ${build} |`,
              '',
              `[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            ].join('\n');
            const {owner, repo} = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {owner, repo, issue_number: context.issue.number, per_page: 100});
            const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body});
            else await github.rest.issues.createComment({owner, repo, issue_number: context.issue.number, body});
